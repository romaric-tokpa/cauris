<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wireframes — Écrans de formulaires</title>

<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #ffffff;
    --bg: #ecebe6;
    --panel: #f5f5f2;
    --panel-2: #efeeea;
    --ink: #20201f;
    --ink-soft: #5f5f63;
    --ink-faint: #9a9a9e;
    --line: #d8d7d2;
    --line-soft: #e8e7e2;
    --accent: #2f5d8c;          /* muted blue (overridable by tweak) */
    --pos: #2f7d57;             /* positive green */
    --neg: #b8462f;             /* over/alert red */
    --warn: #b07d18;            /* warning amber */
    /* washes derive from the signal + paper, so they adapt to dark automatically */
    --accent-wash: color-mix(in srgb, var(--accent) 14%, var(--paper));
    --pos-wash: color-mix(in srgb, var(--pos) 14%, var(--paper));
    --neg-wash: color-mix(in srgb, var(--neg) 15%, var(--paper));
    --warn-wash: color-mix(in srgb, var(--warn) 16%, var(--paper));
    /* strong fill (primary buttons, active nav, logo) + feature/hero cards */
    --solid: #1d1d1f;       --on-solid: #ffffff;
    --feature: #1d1d1f;     --feature-ink: #ffffff;
    --mono: "Spline Sans Mono", ui-monospace, monospace;
    --sans: "Public Sans", system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --paper: #1c1c21;
    --bg: #131316;
    --panel: #232329;
    --panel-2: #2d2d35;
    --ink: #f2f2ef;
    --ink-soft: #a8a8b0;
    --ink-faint: #74747d;
    --line: #34343d;
    --line-soft: #292930;
    --pos: #54c389;
    --neg: #e3795f;
    --warn: #d8a747;
    --solid: #f1f1ee;       --on-solid: #19191c;
    --feature: #26262d;     --feature-ink: #ffffff;
  }
  .wf, .wf-card { transition: background-color .22s ease, color .22s ease, border-color .22s ease; }

  * { box-sizing: border-box; }

  .wf {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    width: 100%;
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    position: relative;
  }
  .wf-ic { display: block; flex: none; }

  /* ---- typography helpers ---- */
  .t-mono { font-family: var(--mono); font-feature-settings: "tnum"; }
  .t-eyebrow { font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; }
  .t-muted { color: var(--ink-soft); }
  .t-faint { color: var(--ink-faint); }
  .t-pos { color: var(--pos); }
  .t-neg { color: var(--neg); }
  .t-warn { color: var(--warn); }

  /* ---- surfaces ---- */
  .wf-card { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; }
  .wf-card.soft { background: var(--panel); border-color: var(--line-soft); }
  .wf-pad { padding: 18px; }
  .wf-pad-sm { padding: 14px; }
  .wf-hr { height: 1px; background: var(--line-soft); border: 0; margin: 0; }

  .card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
  .card-title { font-size: 14.5px; font-weight: 700; letter-spacing: -.01em; }
  .card-link { font-size: 12px; color: var(--accent); font-weight: 600; display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }

  /* ---- buttons ---- */
  .btn { font-family: var(--sans); font-size: 13px; font-weight: 600; border-radius: 10px; border: 1px solid var(--line);
         background: var(--paper); color: var(--ink); padding: 9px 14px; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; white-space: nowrap; }
  .btn.primary { background: var(--solid); color: var(--on-solid); border-color: var(--solid); }
  .feature-card { background: var(--feature); color: var(--feature-ink); border: none; }
  .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.block { width: 100%; justify-content: center; }
  .icon-btn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line); background: var(--paper);
              display: grid; place-items: center; color: var(--ink-soft); cursor: pointer; position: relative; flex: none; }
  .dot { position: absolute; top: 7px; right: 8px; width: 7px; height: 7px; border-radius: 50%; background: var(--neg); border: 1.5px solid var(--paper); }

  /* ---- segmented + chips + fields ---- */
  .seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 10px; padding: 3px; gap: 2px; }
  .seg button { font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); background: transparent; border: 0; padding: 6px 13px; border-radius: 7px; cursor: pointer; }
  .seg button.on { background: var(--paper); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  .chip { font-size: 12px; font-weight: 600; color: var(--ink-soft); background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 999px; padding: 6px 12px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .chip.on { background: var(--solid); color: var(--on-solid); border-color: var(--solid); }
  .field { display: flex; align-items: center; gap: 9px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 9px 13px; color: var(--ink-faint); font-size: 13px; }
  .field input { border: 0; background: transparent; font-family: var(--sans); font-size: 13px; color: var(--ink); outline: none; width: 100%; }

  /* ---- badges ---- */
  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: .01em; }
  .badge.ok { background: var(--pos-wash); color: var(--pos); }
  .badge.warn { background: var(--warn-wash); color: var(--warn); }
  .badge.over { background: var(--neg-wash); color: var(--neg); }

  /* ---- avatar ---- */
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--panel-2); border: 1px solid var(--line); display: grid; place-items: center; font-weight: 700; font-size: 14px; color: var(--ink-soft); flex: none; }
  .avatar.sm { width: 30px; height: 30px; font-size: 12px; }

  /* ---- logo ---- */
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark { width: 30px; height: 30px; border-radius: 9px; background: var(--solid); color: var(--on-solid); display: grid; place-items: center; font-weight: 800; font-size: 15px; flex: none; }
  .logo-name { font-weight: 800; font-size: 16px; letter-spacing: -.02em; }

  /* ---- nav (sidebar) ---- */
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; color: var(--ink-soft); font-size: 13.5px; font-weight: 600; cursor: pointer; }
  .nav-item.on { background: var(--solid); color: var(--on-solid); }
  .nav-item .wf-ic { color: inherit; opacity: .9; }
  .nav-item.on .wf-ic { opacity: 1; }
  .nav-group { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-faint); font-weight: 700; padding: 0 12px; margin: 16px 0 6px; }

  /* ---- top nav (horizontal, variant B) ---- */
  .topnav-link { font-size: 13.5px; font-weight: 600; color: var(--ink-soft); padding: 8px 4px; cursor: pointer; position: relative; }
  .topnav-link.on { color: var(--ink); }
  .topnav-link.on::after { content: ""; position: absolute; left: 0; right: 0; bottom: -13px; height: 2.5px; background: var(--ink); border-radius: 2px; }

  /* ---- kpi ---- */
  .kpi-label { font-size: 12px; color: var(--ink-soft); font-weight: 600; display: flex; align-items: center; gap: 7px; }
  .kpi-val { font-family: var(--mono); font-weight: 600; letter-spacing: -.02em; }
  .kpi-cur { font-size: 13px; color: var(--ink-faint); font-weight: 500; }
  .delta { font-size: 11.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 2px; }
  .kpi-icon { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; flex: none; }

  /* ---- progress ---- */
  .wf-prog { height: 7px; background: var(--panel-2); border-radius: 999px; overflow: hidden; }
  .wf-prog-fill { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
  .wf-prog-fill.over { background: var(--neg); }
  .wf-prog-fill.warn { background: var(--warn); }
  .wf-prog-fill.ok { background: var(--pos); }

  /* ---- bars ---- */
  .wf-bars { display: flex; align-items: flex-end; gap: 16px; padding-top: 6px; }
  .wf-bargrp { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; justify-content: flex-end; }
  .wf-barpair { display: flex; align-items: flex-end; gap: 4px; height: 100%; width: 100%; justify-content: center; }
  .wf-bar { width: 14px; border-radius: 4px 4px 0 0; }
  .wf-bar.rev { background: var(--ink); }
  .wf-bar.dep { background: var(--line); }
  .wf-barlbl { font-size: 11px; color: var(--ink-faint); font-weight: 600; }

  /* ---- donut ---- */
  .wf-donut { border-radius: 50%; position: relative; flex: none; }
  .wf-donut-hole { position: absolute; background: var(--paper); border-radius: 50%; display: grid; place-content: center; text-align: center; }
  .wf-donut-val { font-family: var(--mono); font-weight: 600; font-size: 18px; }
  .wf-donut-sub { font-size: 10.5px; color: var(--ink-faint); font-weight: 600; }

  /* ---- spark ---- */
  .wf-spark { display: block; }

  /* ---- list rows ---- */
  .row-line { display: flex; align-items: center; gap: 12px; padding: 11px 0; }
  .row-line + .row-line { border-top: 1px solid var(--line-soft); }
  .row-ico { width: 36px; height: 36px; border-radius: 9px; background: var(--panel-2); display: grid; place-items: center; color: var(--ink-soft); flex: none; }
  .row-amt { font-family: var(--mono); font-weight: 600; font-size: 13.5px; margin-left: auto; white-space: nowrap; }

  /* ---- alert row ---- */
  .alert { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-radius: 11px; border: 1px solid var(--line-soft); background: var(--panel); }
  .alert .swatch { width: 4px; align-self: stretch; border-radius: 4px; }
  .alert.over .swatch { background: var(--neg); }
  .alert.warn .swatch { background: var(--warn); }
  .alert.ok .swatch { background: var(--pos); }

  /* ---- mobile shells ---- */
  .phone-bar { height: 30px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px 0; font-size: 12px; font-weight: 700; color: var(--ink); }
  .phone-bar .dots { display: flex; gap: 4px; align-items: center; }
  .tabbar { position: absolute; left: 0; right: 0; bottom: 0; height: 64px; background: var(--paper); border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-around; padding: 0 8px; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--ink-faint); font-size: 9.5px; font-weight: 600; flex: 1; }
  .tab.on { color: var(--ink); }
  .fab { width: 50px; height: 50px; border-radius: 16px; background: var(--solid); color: var(--on-solid); display: grid; place-items: center; margin-top: -22px; box-shadow: 0 6px 16px rgba(0,0,0,.18); }
  .pillnav { position: absolute; left: 50%; transform: translateX(-50%); bottom: 16px; height: 56px; background: var(--feature); border-radius: 999px; display: flex; align-items: center; gap: 6px; padding: 0 10px; box-shadow: 0 8px 22px rgba(0,0,0,.22); }
  .pillnav .pt { width: 44px; height: 44px; border-radius: 999px; display: grid; place-items: center; color: rgba(255,255,255,.55); }
  .pillnav .pt.on { color: #fff; background: rgba(255,255,255,.16); }
  .pillnav .pc { width: 46px; height: 46px; border-radius: 999px; background: #fff; color: #19191c; display: grid; place-items: center; }

  /* ---- scroll hint for mobile content ---- */
  .scrollcol { display: flex; flex-direction: column; gap: 14px; }

  /* annotation flag (wireframe note) */
  .wf-note { font-size: 11px; color: var(--accent); font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }

  /* ---- table ---- */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { text-align: left; font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); font-weight: 700; padding: 0 12px 10px; }
  .tbl th.num, .tbl td.num { text-align: right; }
  .tbl td { padding: 12px; border-top: 1px solid var(--line-soft); font-size: 13px; vertical-align: middle; }
  .tbl tr:hover td { background: var(--panel); }
  .tag-cat { font-size: 11px; font-weight: 600; color: var(--ink-soft); background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 7px; padding: 3px 9px; display: inline-block; }

  /* ---- drawer + scrim (desktop) ---- */
  .scrim { position: absolute; inset: 0; background: rgba(25,22,18,.30); z-index: 5; }
  .drawer { position: absolute; right: 0; top: 0; bottom: 0; width: 410px; background: var(--paper); border-left: 1px solid var(--line); z-index: 6; display: flex; flex-direction: column; box-shadow: -16px 0 40px rgba(0,0,0,.10); }
  .drawer-h { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line-soft); }
  .drawer-b { padding: 22px; display: flex; flex-direction: column; gap: 16px; overflow: hidden; }
  .drawer-f { margin-top: auto; padding: 16px 22px; border-top: 1px solid var(--line-soft); display: flex; gap: 10px; }

  /* ---- mobile bottom sheet ---- */
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; background: var(--paper); border-radius: 20px 20px 0 0; border-top: 1px solid var(--line); box-shadow: 0 -14px 40px rgba(0,0,0,.16); z-index: 6; padding: 8px 18px 22px; display: flex; flex-direction: column; gap: 14px; }
  .sheet-grip { width: 38px; height: 4px; border-radius: 999px; background: var(--line); margin: 6px auto 4px; }

  /* ---- form controls ---- */
  .lbl { font-size: 11.5px; font-weight: 700; color: var(--ink-soft); margin-bottom: 7px; display: block; letter-spacing: .01em; }
  .inp { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; font-size: 13.5px; color: var(--ink); }
  .inp .ph { color: var(--ink-faint); }
  .inp.big { font-family: var(--mono); font-size: 19px; font-weight: 600; white-space: nowrap; }
  .inp.big > span:first-child { white-space: nowrap; }
  .seg-full { display: flex; background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 10px; padding: 3px; gap: 2px; }
  .seg-full button { flex: 1; font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); background: transparent; border: 0; padding: 8px; border-radius: 7px; cursor: pointer; }
  .seg-full button.on { background: var(--paper); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.06); }

  /* ---- segmented sub-nav for module pages ---- */
  .subnav { display: flex; gap: 4px; border-bottom: 1px solid var(--line); }
  .subnav .si { font-size: 13px; font-weight: 600; color: var(--ink-soft); padding: 10px 4px; margin-right: 18px; cursor: pointer; position: relative; }
  .subnav .si.on { color: var(--ink); }
  .subnav .si.on::after { content: ""; position: absolute; left: 0; right: 18px; bottom: -1px; height: 2.5px; background: var(--ink); border-radius: 2px; }

  /* ---- stat strip ---- */
  .stat { flex: 1; }
  .stat .sl { font-size: 11.5px; color: var(--ink-soft); font-weight: 600; }
  .stat .sv { font-family: var(--mono); font-weight: 600; font-size: 19px; margin-top: 5px; }

  /* generic flex helpers */
  .r { display: flex; align-items: center; }
  .c { display: flex; flex-direction: column; }
  .between { justify-content: space-between; }
  .wrap { flex-wrap: wrap; }
  /* ---- settings ---- */
  .switch { width: 42px; height: 24px; border-radius: 999px; background: var(--line); position: relative; flex: none; cursor: pointer; transition: background .18s; }
  .switch.on { background: var(--accent); }
  .switch i { position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 999px; background: #fff; transition: left .18s; box-shadow: 0 1px 2px rgba(0,0,0,.25); }
  .switch.on i { left: 20px; }
  .set-row { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-top: 1px solid var(--line-soft); }
  .set-row:first-child { border-top: none; }
  .set-ico { width: 38px; height: 38px; border-radius: 10px; background: var(--panel-2); display: grid; place-items: center; color: var(--ink-soft); flex: none; }
  .set-nav { display: flex; flex-direction: column; gap: 3px; }
  .set-nav .si2 { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border-radius: 10px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer; }
  .set-nav .si2.on { background: var(--panel-2); color: var(--ink); }

  /* ---- auth / onboarding / states ---- */
  .steps { display: flex; gap: 6px; }
  .steps i { flex: 1; height: 5px; border-radius: 999px; background: var(--line); }
  .steps i.on { background: var(--accent); }
  .choice { display: flex; align-items: center; gap: 13px; padding: 14px; border: 1.5px solid var(--line); border-radius: 13px; background: var(--paper); cursor: pointer; }
  .choice.on { border-color: var(--accent); background: var(--accent-wash); }
  .checkbox { width: 22px; height: 22px; border-radius: 7px; border: 1.5px solid var(--line); display: grid; place-items: center; flex: none; color: #fff; }
  .checkbox.on { background: var(--accent); border-color: var(--accent); }
  .radio-c { width: 22px; height: 22px; border-radius: 999px; border: 1.5px solid var(--line); display: grid; place-items: center; flex: none; }
  .radio-c.on { border-color: var(--accent); }
  .radio-c.on::after { content: ""; width: 11px; height: 11px; border-radius: 999px; background: var(--accent); }
  .auth-logo { display: flex; flex-direction: column; align-items: center; gap: 13px; }
  .auth-logo .lm { width: 54px; height: 54px; border-radius: 16px; background: var(--solid); color: var(--on-solid); display: grid; place-items: center; font-weight: 800; font-size: 26px; }
  .big-ico { width: 76px; height: 76px; border-radius: 999px; display: grid; place-items: center; flex: none; }

  /* ---- assistant / chat ---- */
  .chat { display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; max-width: 82%; }
  .msg.u { align-self: flex-end; flex-direction: row-reverse; }
  .bubble { padding: 12px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; }
  .msg.u .bubble { background: var(--solid); color: var(--on-solid); border-bottom-right-radius: 5px; }
  .msg.ai .bubble { background: var(--panel); border: 1px solid var(--line-soft); border-bottom-left-radius: 5px; }
  .ai-av { width: 30px; height: 30px; border-radius: 9px; background: var(--solid); color: var(--on-solid); display: grid; place-items: center; font-weight: 800; font-size: 13px; flex: none; }
  .ask { display: flex; align-items: center; gap: 10px; background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px; color: var(--ink-faint); font-size: 13px; }
  .insight-tag { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 3px 8px; border-radius: 6px; background: var(--panel-2); color: var(--ink-soft); }

  /* ---- capture / coach (new) ---- */
  .cap-tile { display: flex; align-items: center; gap: 13px; padding: 14px; border: 1.5px solid var(--line); border-radius: 14px; background: var(--paper); cursor: pointer; }
  .cap-tile .ti { width: 42px; height: 42px; border-radius: 11px; background: var(--panel-2); color: var(--ink-soft); display: grid; place-items: center; flex: none; }
  .cap-tile.feat { background: var(--feature); color: var(--feature-ink); border-color: transparent; }
  .cap-tile.feat .ti { background: rgba(255,255,255,.16); color: #fff; }

  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .key { height: 52px; border-radius: 12px; background: var(--panel); border: 1px solid var(--line-soft); display: grid; place-items: center; font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--ink); cursor: pointer; }
  .key.alt { background: transparent; border-color: transparent; color: var(--ink-soft); }

  .wave { display: flex; align-items: center; gap: 3px; height: 56px; justify-content: center; }
  .wave i { width: 4px; border-radius: 999px; background: var(--accent); opacity: .85; }

  .conf { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px; letter-spacing: .02em; }
  .conf.high { background: var(--pos-wash); color: var(--pos); }
  .conf.med { background: var(--warn-wash); color: var(--warn); }
  .conf.low { background: var(--neg-wash); color: var(--neg); }
  .conf-dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

  .confbar { height: 8px; border-radius: 999px; background: var(--panel-2); overflow: hidden; }
  .confbar i { display: block; height: 100%; border-radius: 999px; background: var(--accent); }

  /* layered coach answer */
  .layer { display: flex; gap: 13px; padding: 14px 0; }
  .layer + .layer { border-top: 1px solid var(--line-soft); }
  .layer .ln { width: 30px; height: 30px; border-radius: 9px; background: var(--panel-2); color: var(--ink-soft); display: grid; place-items: center; flex: none; font-size: 11px; font-weight: 800; }
  .layer-k { font-size: 10.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); }

  /* maturity dots */
  .mat { display: flex; gap: 5px; }
  .mat i { width: 26px; height: 5px; border-radius: 999px; background: var(--line); }
  .mat i.on { background: var(--pos); }

  /* segmented level scale (intervention) */
  .scale { display: flex; gap: 6px; }
  .scale .lv { flex: 1; text-align: center; padding: 9px 6px; border-radius: 10px; border: 1px solid var(--line-soft); background: var(--panel); font-size: 11px; font-weight: 600; color: var(--ink-soft); }
  .scale .lv.on { background: var(--solid); color: var(--on-solid); border-color: var(--solid); }

  /* ---- mini calendar (period picker) ---- */
  .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal .cd { aspect-ratio: 1; display: grid; place-items: center; font-size: 12px; font-family: var(--mono); color: var(--ink); border-radius: 8px; cursor: pointer; }
  .cal .cd.dim { color: var(--ink-faint); }
  .cal .cd.hd { font-family: var(--sans); font-weight: 700; font-size: 10px; color: var(--ink-faint); cursor: default; }
  .cal .cd.rng { background: var(--accent-wash); border-radius: 0; }
  .cal .cd.e1 { background: var(--accent); color: #fff; border-radius: 8px 0 0 8px; }
  .cal .cd.e2 { background: var(--accent); color: #fff; border-radius: 0 8px 8px 0; }
  /* upload dropzone */
  .dropzone { border: 1.5px dashed var(--line); border-radius: 14px; padding: 26px; text-align: center; background: var(--panel); }
  /* faq accordion row */
  .faq-row { display: flex; align-items: center; gap: 12px; padding: 15px 0; border-top: 1px solid var(--line-soft); cursor: pointer; }
  .faq-row:first-child { border-top: none; }

  [data-glass="on"] .wf {
    background: var(--bg) !important;
  }
  [data-glass="on"] .wf-card,
  [data-glass="on"] .field,
  [data-glass="on"] .inp,
  [data-glass="on"] .ask,
  [data-glass="on"] .seg {
    background: color-mix(in srgb, var(--paper) 48%, transparent) !important;
    -webkit-backdrop-filter: blur(20px) saturate(165%);
    backdrop-filter: blur(20px) saturate(165%);
    border-color: color-mix(in srgb, #ffffff 50%, transparent) !important;
  }
  [data-glass="on"] .wf-card { box-shadow: 0 10px 34px rgba(18,18,38,.12), inset 0 1px 0 rgba(255,255,255,.5); }
  [data-glass="on"] .wf-card.soft { background: color-mix(in srgb, var(--paper) 34%, transparent) !important; }
  [data-glass="on"] .wf > aside,
  [data-glass="on"] .wf > main > header,
  [data-glass="on"] .tabbar {
    background: color-mix(in srgb, var(--paper) 42%, transparent) !important;
    -webkit-backdrop-filter: blur(26px) saturate(165%);
    backdrop-filter: blur(26px) saturate(165%);
    border-color: color-mix(in srgb, #ffffff 42%, transparent) !important;
  }
  [data-glass="on"] .drawer,
  [data-glass="on"] .sheet {
    background: color-mix(in srgb, var(--paper) 56%, transparent) !important;
    -webkit-backdrop-filter: blur(28px) saturate(170%);
    backdrop-filter: blur(28px) saturate(170%);
  }
  [data-glass="on"] .feature-card,
  [data-glass="on"] .pillnav {
    background: color-mix(in srgb, var(--feature) 58%, transparent) !important;
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    backdrop-filter: blur(22px) saturate(160%);
    border: 1px solid rgba(255,255,255,.18) !important;
  }
