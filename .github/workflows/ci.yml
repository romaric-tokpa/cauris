name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Quality (lint + types + tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build

  e2e:
    name: E2E fonctionnel (Playwright)
    runs-on: ubuntu-latest
    env:
      # Auth de test (pas de secret réel ; base SQLite locale éphémère du job).
      BETTER_AUTH_SECRET: ci-e2e-secret-not-for-production
      BETTER_AUTH_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Crée les tables d'auth dans la base SQLite locale avant de lancer les serveurs.
      - run: npm run db:migrate
      # UNIQUEMENT les tests FONCTIONNELS (projet smoke : l'app monte + parcours).
      # La RÉGRESSION VISUELLE (projet fidelity, toHaveScreenshot) est un gate LOCAL :
      # les baselines pixel sont spécifiques à macOS (-darwin) et donneraient des faux
      # positifs cross-OS sur un runner Linux. Cf. e2e/baselines/README.md.
      - run: npm run e2e:ci
